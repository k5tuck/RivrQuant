name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # .NET API
  # ---------------------------------------------------------------------------
  api:
    name: .NET API (build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/RivrQuant.sln

      - name: Build
        run: dotnet build src/RivrQuant.sln --no-restore -c Release

      - name: Test
        run: dotnet test src/RivrQuant.sln --no-build -c Release --logger "github;report-failed-tests=true"

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    name: Next.js frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true   # warn but don't block merges

      - name: Build (with stub URLs)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL:     "http://localhost:5000"
          NEXT_PUBLIC_SIGNALR_URL: "http://localhost:5000/hubs/trading"

  # ---------------------------------------------------------------------------
  # Docker Compose smoke test (optional — verifies containers start up)
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [api, frontend]
    # Only run on pushes to main to save CI minutes.
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Write stub .env
        run: |
          cat > .env << 'EOF'
          ASPNETCORE_ENVIRONMENT=Development
          RIVRQUANT_MODE=Paper
          DATABASE_PROVIDER=PostgreSQL
          DATABASE_CONNECTION=Host=postgres;Database=rivrquant;Username=rq;Password=ci-test
          DB_PASSWORD=ci-test
          QC_USER_ID=stub
          QC_API_TOKEN=stub
          QC_PROJECT_IDS=0
          QC_POLL_INTERVAL_SECONDS=300
          ALPACA_API_KEY=stub
          ALPACA_API_SECRET=stub
          ALPACA_PAPER=true
          ALPACA_BASE_URL=https://paper-api.alpaca.markets
          BYBIT_API_KEY=stub
          BYBIT_API_SECRET=stub
          BYBIT_USE_TESTNET=true
          BYBIT_TESTNET_URL=https://api-testnet.bybit.com
          BYBIT_LIVE_URL=https://api.bybit.com
          ANTHROPIC_API_KEY=stub
          ANTHROPIC_MODEL=claude-sonnet-4-20250514
          ANTHROPIC_MAX_TOKENS=4096
          SENDGRID_API_KEY=stub
          SENDGRID_FROM_EMAIL=alerts@rivrquant.com
          SENDGRID_FROM_NAME=RivrQuant Alerts
          ALERT_EMAIL_RECIPIENTS=stub@example.com
          TWILIO_ACCOUNT_SID=stub
          TWILIO_AUTH_TOKEN=stub
          TWILIO_FROM_NUMBER=+10000000000
          ALERT_SMS_RECIPIENTS=+10000000001
          SIGNALR_ENABLE=true
          CORS_ORIGINS=http://localhost:3000
          NEXT_PUBLIC_API_URL=http://localhost:5000
          NEXT_PUBLIC_SIGNALR_URL=http://localhost:5000/hubs/trading
          EOF

      - name: Build images
        run: docker compose build
        env:
          NEXT_PUBLIC_API_URL:     "http://localhost:5000"
          NEXT_PUBLIC_SIGNALR_URL: "http://localhost:5000/hubs/trading"

      - name: Start stack
        run: docker compose up -d
        env:
          NEXT_PUBLIC_API_URL:     "http://localhost:5000"
          NEXT_PUBLIC_SIGNALR_URL: "http://localhost:5000/hubs/trading"

      - name: Wait for API health
        run: |
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          docker compose logs api
          exit 1

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
