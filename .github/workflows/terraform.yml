name: Terraform — Plan & Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write   # allows the plan bot to comment on PRs

env:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: infra/terraform
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'push' && 'apply' || 'plan') }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true   # warn but don't block

      - name: Terraform Validate
        run: terraform validate

      # -----------------------------------------------------------------------
      # Plan (always — on PRs this is the only step that matters)
      # -----------------------------------------------------------------------
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=ci.tfvars \
            -out=tfplan \
            -no-color \
            2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          # All sensitive vars are injected from GitHub Secrets.
          # Non-secret vars can also go in ci.tfvars (created below).
          TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_qc_user_id:             ${{ secrets.TF_VAR_QC_USER_ID }}
          TF_VAR_qc_api_token:           ${{ secrets.TF_VAR_QC_API_TOKEN }}
          TF_VAR_alpaca_api_key:         ${{ secrets.TF_VAR_ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret:      ${{ secrets.TF_VAR_ALPACA_API_SECRET }}
          TF_VAR_bybit_api_key:          ${{ secrets.TF_VAR_BYBIT_API_KEY }}
          TF_VAR_bybit_api_secret:       ${{ secrets.TF_VAR_BYBIT_API_SECRET }}
          TF_VAR_anthropic_api_key:      ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_sendgrid_api_key:       ${{ secrets.TF_VAR_SENDGRID_API_KEY }}
          TF_VAR_twilio_account_sid:     ${{ secrets.TF_VAR_TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:      ${{ secrets.TF_VAR_TWILIO_AUTH_TOKEN }}
          TF_VAR_git_token:              ${{ secrets.TF_VAR_GIT_TOKEN }}

      - name: Create ci.tfvars
        run: |
          cat > ci.tfvars <<'EOF'
          aws_region               = "${{ vars.AWS_REGION || 'us-east-1' }}"
          instance_type            = "${{ vars.TF_INSTANCE_TYPE || 't3.medium' }}"
          key_name                 = "${{ vars.TF_KEY_NAME }}"
          allowed_ssh_cidr         = "${{ vars.TF_ALLOWED_SSH_CIDR || '0.0.0.0/0' }}"
          git_repo_url             = "${{ vars.TF_GIT_REPO_URL }}"
          domain_name              = "${{ vars.TF_DOMAIN_NAME || '' }}"
          route53_zone_id          = "${{ vars.TF_ROUTE53_ZONE_ID || '' }}"
          certbot_email            = "${{ vars.TF_CERTBOT_EMAIL || '' }}"
          rivrquant_mode           = "${{ vars.TF_RIVRQUANT_MODE || 'Paper' }}"
          qc_project_ids           = "${{ vars.TF_QC_PROJECT_IDS }}"
          qc_poll_interval_seconds = ${{ vars.TF_QC_POLL_INTERVAL || '300' }}
          alpaca_paper             = ${{ vars.TF_ALPACA_PAPER || 'true' }}
          alpaca_base_url          = "${{ vars.TF_ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}"
          bybit_use_testnet        = ${{ vars.TF_BYBIT_USE_TESTNET || 'true' }}
          anthropic_model          = "${{ vars.TF_ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}"
          sendgrid_from_email      = "${{ vars.TF_SENDGRID_FROM_EMAIL || 'alerts@rivrquant.com' }}"
          sendgrid_from_name       = "${{ vars.TF_SENDGRID_FROM_NAME || 'RivrQuant Alerts' }}"
          alert_email_recipients   = "${{ vars.TF_ALERT_EMAIL_RECIPIENTS }}"
          twilio_from_number       = "${{ vars.TF_TWILIO_FROM_NUMBER }}"
          alert_sms_recipients     = "${{ vars.TF_ALERT_SMS_RECIPIENTS }}"
          cors_origins             = "${{ vars.TF_CORS_ORIGINS || '' }}"
          EOF
        shell: bash

      # Post plan summary on PRs so reviewers can see what will change.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncated, see Actions log for full output)'
              : plan;
            const body = `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # -----------------------------------------------------------------------
      # Apply — only on push to main or explicit workflow_dispatch apply
      # -----------------------------------------------------------------------
      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_qc_user_id:             ${{ secrets.TF_VAR_QC_USER_ID }}
          TF_VAR_qc_api_token:           ${{ secrets.TF_VAR_QC_API_TOKEN }}
          TF_VAR_alpaca_api_key:         ${{ secrets.TF_VAR_ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret:      ${{ secrets.TF_VAR_ALPACA_API_SECRET }}
          TF_VAR_bybit_api_key:          ${{ secrets.TF_VAR_BYBIT_API_KEY }}
          TF_VAR_bybit_api_secret:       ${{ secrets.TF_VAR_BYBIT_API_SECRET }}
          TF_VAR_anthropic_api_key:      ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_sendgrid_api_key:       ${{ secrets.TF_VAR_SENDGRID_API_KEY }}
          TF_VAR_twilio_account_sid:     ${{ secrets.TF_VAR_TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:      ${{ secrets.TF_VAR_TWILIO_AUTH_TOKEN }}
          TF_VAR_git_token:              ${{ secrets.TF_VAR_GIT_TOKEN }}

      # -----------------------------------------------------------------------
      # Destroy — only on explicit workflow_dispatch
      # -----------------------------------------------------------------------
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file=ci.tfvars \
            -auto-approve
        env:
          TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_qc_user_id:             ${{ secrets.TF_VAR_QC_USER_ID }}
          TF_VAR_qc_api_token:           ${{ secrets.TF_VAR_QC_API_TOKEN }}
          TF_VAR_alpaca_api_key:         ${{ secrets.TF_VAR_ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret:      ${{ secrets.TF_VAR_ALPACA_API_SECRET }}
          TF_VAR_bybit_api_key:          ${{ secrets.TF_VAR_BYBIT_API_KEY }}
          TF_VAR_bybit_api_secret:       ${{ secrets.TF_VAR_BYBIT_API_SECRET }}
          TF_VAR_anthropic_api_key:      ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_sendgrid_api_key:       ${{ secrets.TF_VAR_SENDGRID_API_KEY }}
          TF_VAR_twilio_account_sid:     ${{ secrets.TF_VAR_TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:      ${{ secrets.TF_VAR_TWILIO_AUTH_TOKEN }}
          TF_VAR_git_token:              ${{ secrets.TF_VAR_GIT_TOKEN }}

      - name: Terraform Outputs
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform output
